<script>
    // اترك هذه الخانات كما هي
    const REPO_OWNER = 'samirinfodz-boop';
    const REPO_NAME = 'techno-info-store';
    
    // قائمة المنتجات (سيتم تحديثها تلقائياً عند الحفظ)
    let products = [
        { id: 1, name: "HENEX HC-3208", price: "14500", img: "https://i.imgur.com/9QBRvNk.png" },
        { id: 2, name: "SMART SP-X86", price: "16500", img: "https://i.imgur.com/9QBRvNk.png" }
    ];

    function renderProducts() {
        const grid = document.getElementById('products-grid');
        if(!grid) return;
        grid.innerHTML = products.map(p => `
            <div class="bg-white p-6 rounded-2xl shadow-md product-card text-center border">
                <img src="${p.img}" class="w-48 h-48 mx-auto object-contain mb-4">
                <h3 class="text-xl font-bold text-gray-800">${p.name}</h3>
                <p class="text-blue-600 font-bold text-lg my-2">${p.price} DA</p>
                <a href="https://wa.me/213666636473?text=طلب: ${p.name}" class="bg-green-500 text-white px-6 py-2 rounded-full inline-block px-4 py-2">اطلب الآن</a>
            </div>
        `).join('');
    }

    let clicks = 0;
    function triggerAdmin() {
        clicks++;
        if (clicks >= 5) {
            // طلب الـ Token يدوياً لحماية حسابك
            const pass = prompt("يرجى إدخال GitHub Token للوصول للوحة التحكم:");
            if (pass && pass.startsWith('ghp_')) {
                sessionStorage.setItem('gh_token', pass);
                document.getElementById('admin-panel').style.display = 'block';
                renderAdminList();
            } else {
                alert("Token غير صحيح!");
            }
            clicks = 0;
        }
    }

    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

    // ... باقي الوظائف (renderAdminList, saveNewProduct, deleteProduct) تبقى كما هي ...

    async function syncToGitHub() {
        const token = sessionStorage.getItem('gh_token'); // جلب الـ Token من الجلسة المؤقتة
        const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/index.html`;
        try {
            const getFile = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
            const fileData = await getFile.json();
            const sha = fileData.sha;
            let currentContent = decodeURIComponent(escape(atob(fileData.content)));
            const regex = /let products = \[[\s\S]*?\];/;
            const newContent = currentContent.replace(regex, `let products = ${JSON.stringify(products, null, 4)};`);
            
            const response = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "Update products via Admin Panel",
                    content: btoa(unescape(encodeURIComponent(newContent))),
                    sha: sha
                })
            });
            if(response.ok) { alert("تم التحديث بنجاح!"); location.reload(); }
            else { alert("خطأ في التحديث، تأكد من صلاحيات الـ Token."); }
        } catch (e) { alert("حدث خطأ في الاتصال بـ GitHub"); }
    }
    renderProducts();
</script>
