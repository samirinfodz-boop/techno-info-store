<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Techno Infodz Store | متجر تكنو إنفو دي زاد</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; }
        #admin-panel { display: none; position: fixed; top: 0; right: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; color: white; padding: 20px; overflow-y: auto; }
        .product-card:hover { transform: translateY(-5px); transition: 0.3s; }
    </style>
</head>
<body>

    <header class="bg-blue-800 text-white p-6 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-bold cursor-pointer select-none" onclick="triggerAdmin()">TECHNO INFODZ</h1>
            <nav>
                <a href="tel:0666636473" class="bg-green-500 hover:bg-green-600 px-4 py-2 rounded-lg font-bold">
                    <i class="fas fa-phone"></i> 0666636473
                </a>
            </nav>
        </div>
    </header>

    <main class="container mx-auto p-8">
        <div class="text-center mb-12">
            <h2 class="text-4xl font-bold text-gray-800">أجهزة الباركود وحلول البرمجيات</h2>
            <p class="text-gray-600 mt-2">الموزع الرائد لعلامات HENEX و SMART في الجزائر</p>
        </div>

        <div id="products-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8"></div>
    </main>

    <div id="admin-panel">
        <div class="container mx-auto">
            <div class="flex justify-between items-center border-b border-gray-700 pb-4 mb-6">
                <h2 class="text-2xl font-bold text-yellow-500">لوحة تحكم المسؤول</h2>
                <button onclick="closeAdmin()" class="text-red-500 text-3xl">&times;</button>
            </div>
            <div class="bg-gray-800 p-6 rounded-xl mb-8">
                <h3 class="text-xl mb-4 text-blue-400">إضافة منتج جديد</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <input type="text" id="p-name" placeholder="اسم المنتج" class="p-2 rounded bg-gray-700 text-white">
                    <input type="text" id="p-price" placeholder="السعر" class="p-2 rounded bg-gray-700 text-white">
                    <input type="text" id="p-img" placeholder="رابط الصورة" class="p-2 rounded bg-gray-700 text-white">
                    <button onclick="saveNewProduct()" class="bg-yellow-600 p-2 rounded font-bold">حفظ ونشر</button>
                </div>
            </div>
            <div id="admin-products-list" class="space-y-4"></div>
        </div>
    </div>

    <script>
        const GITHUB_TOKEN = ''; 
        const REPO_OWNER = 'samirinfodz-boop';
        const REPO_NAME = 'techno-info-store';
        
        let products = [
            { id: 1, name: "HENEX HC-3208", price: "14500", img: "https://i.imgur.com/9QBRvNk.png" },
            { id: 2, name: "SMART SP-X86", price: "16500", img: "https://i.imgur.com/9QBRvNk.png" }
        ];

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            if(!grid) return;
            grid.innerHTML = products.map(p => `
                <div class="bg-white p-6 rounded-2xl shadow-md product-card text-center border">
                    <img src="${p.img}" class="w-48 h-48 mx-auto object-contain mb-4">
                    <h3 class="text-xl font-bold text-gray-800">${p.name}</h3>
                    <p class="text-blue-600 font-bold text-lg my-2">${p.price} DA</p>
                    <a href="https://wa.me/213666636473?text=طلب: ${p.name}" class="bg-green-500 text-white px-6 py-2 rounded-full inline-block">اطلب الآن</a>
                </div>
            `).join('');
        }

        let clicks = 0;
        function triggerAdmin() {
            clicks++;
            if (clicks >= 5) {
                document.getElementById('admin-panel').style.display = 'block';
                renderAdminList();
                clicks = 0;
            }
        }
        function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }

        function renderAdminList() {
            const list = document.getElementById('admin-products-list');
            list.innerHTML = products.map((p, index) => `
                <div class="flex justify-between bg-gray-700 p-4 rounded">
                    <span>${p.name} - ${p.price} DA</span>
                    <button onclick="deleteProduct(${index})" class="bg-red-600 px-3 py-1 rounded">حذف</button>
                </div>
            `).join('');
        }

        async function saveNewProduct() {
            const name = document.getElementById('p-name').value;
            const price = document.getElementById('p-price').value;
            const img = document.getElementById('p-img').value;
            if(!name || !price) return alert("أدخل البيانات");
            products.push({ id: Date.now(), name, price, img: img || 'https://via.placeholder.com/150' });
            await syncToGitHub();
        }

        async function deleteProduct(index) {
            if(confirm("حذف؟")) { products.splice(index, 1); await syncToGitHub(); }
        }

        async function syncToGitHub() {
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/index.html`;
            try {
                const getFile = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` } });
                const fileData = await getFile.json();
                const sha = fileData.sha;
                let currentContent = decodeURIComponent(escape(atob(fileData.content)));
                const regex = /let products = \[[\s\S]*?\];/;
                const newContent = currentContent.replace(regex, `let products = ${JSON.stringify(products, null, 4)};`);
                
                await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "Update products",
                        content: btoa(unescape(encodeURIComponent(newContent))),
                        sha: sha
                    })
                });
                alert("تم التحديث!"); location.reload();
            } catch (e) { alert("خطأ في الربط!"); }
        }
        renderProducts();
    </script>
</body>
</html>
